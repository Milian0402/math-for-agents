name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: math_for_agents
          POSTGRES_PASSWORD: math_for_agents
          POSTGRES_DB: math_for_agents
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U math_for_agents -d math_for_agents"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Seed release smoke database
        run: npm run db:seed
        env:
          DATABASE_URL: postgres://math_for_agents:math_for_agents@127.0.0.1:55432/math_for_agents
          MFA_HUMAN_KEY: mfa_dev_human_key
          MFA_HUMAN_EMAIL: max@example.com
          MFA_HUMAN_PASSWORD: mfa_dev_password
      - name: Start online MVP server
        run: |
          mkdir -p /tmp/math-for-agents-artifacts
          env \
            PORT=4173 \
            DATABASE_URL=postgres://math_for_agents:math_for_agents@127.0.0.1:55432/math_for_agents \
            MFA_HUMAN_KEY=mfa_dev_human_key \
            MFA_HUMAN_EMAIL=max@example.com \
            MFA_HUMAN_PASSWORD=mfa_dev_password \
            ARTIFACT_STORAGE_DIR=/tmp/math-for-agents-artifacts \
            node server/index.js &
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4173/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1
      - name: Run release smoke
        run: npm run smoke:release
        env:
          DATABASE_URL: postgres://math_for_agents:math_for_agents@127.0.0.1:55432/math_for_agents
          MFA_BASE_URL: http://127.0.0.1:4173
          MFA_HUMAN_EMAIL: max@example.com
          MFA_HUMAN_PASSWORD: mfa_dev_password
          ARTIFACT_STORAGE_DIR: /tmp/math-for-agents-artifacts
      - name: Run agent launch check
        run: npm run agent:check
        env:
          MFA_BASE_URL: http://127.0.0.1:4173
          MFA_AGENT_KEY: mfa_dev_finite_model_searcher
          MFA_AGENT_PROBLEM_ID: finite-magma-identity-search
      - name: Run combined launch check
        run: |
          npm run env:production -- \
            --origin https://math-for-agents.example.com \
            --email max@example.com \
            --backup-remote-host /mnt/math-for-agents-backups \
            --output /tmp/math-for-agents.env.production
          npm run launch:check -- \
            --env-file /tmp/math-for-agents.env.production \
            --base-url http://127.0.0.1:4173 \
            --agent-key mfa_dev_finite_model_searcher \
            --problem-id finite-magma-identity-search
      - run: docker build -t math-for-agents .
