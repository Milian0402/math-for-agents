services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-math_for_agents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-math_for_agents}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-math_for_agents} -d ${POSTGRES_DB:-math_for_agents}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ..
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4173
      DATABASE_URL: postgres://${POSTGRES_USER:-math_for_agents}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-math_for_agents}
      DATABASE_SSL: "false"
      ARTIFACT_STORAGE_DIR: /data/artifacts
      ARTIFACT_MAX_BYTES: ${ARTIFACT_MAX_BYTES:-10000000}
      MFA_WORKSPACE_ID: ${MFA_WORKSPACE_ID:-workspace:default}
      MFA_HUMAN_ID: ${MFA_HUMAN_ID:-human:admin}
      MFA_HUMAN_EMAIL: ${MFA_HUMAN_EMAIL:?MFA_HUMAN_EMAIL is required}
      MFA_HUMAN_NAME: ${MFA_HUMAN_NAME:-Admin}
      MFA_HUMAN_PASSWORD: ${MFA_HUMAN_PASSWORD:?MFA_HUMAN_PASSWORD is required}
      MFA_HUMAN_KEY: ${MFA_HUMAN_KEY:?MFA_HUMAN_KEY is required}
      MFA_DEFAULT_VERIFIER_AGENT_ID: ${MFA_DEFAULT_VERIFIER_AGENT_ID:?MFA_DEFAULT_VERIFIER_AGENT_ID is required}
      MFA_COOKIE_SECURE: ${MFA_COOKIE_SECURE:-true}
      MFA_PUBLIC_ORIGIN: ${MFA_PUBLIC_ORIGIN:?MFA_PUBLIC_ORIGIN is required}
      MFA_RATE_LIMIT_ENABLED: ${MFA_RATE_LIMIT_ENABLED:-true}
      MFA_RATE_LIMIT_LOGIN_MAX: ${MFA_RATE_LIMIT_LOGIN_MAX:-10}
      MFA_RATE_LIMIT_WRITE_MAX: ${MFA_RATE_LIMIT_WRITE_MAX:-120}
      MFA_RATE_LIMIT_READ_MAX: ${MFA_RATE_LIMIT_READ_MAX:-600}
    ports:
      - "${MFA_PUBLIC_PORT:-4173}:4173"
    volumes:
      - artifact_data:/data/artifacts
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ..
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: ["node", "server/worker.mjs"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-math_for_agents}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-math_for_agents}
      DATABASE_SSL: "false"
      ARTIFACT_STORAGE_DIR: /data/artifacts
      ARTIFACT_MAX_BYTES: ${ARTIFACT_MAX_BYTES:-10000000}
      MFA_WORKER_RUNNER: ${MFA_WORKER_RUNNER:-docker}
      MFA_WORKER_IMAGE: ${MFA_WORKER_IMAGE:-python:3.12-alpine}
      MFA_WORKER_TIMEOUT_MS: ${MFA_WORKER_TIMEOUT_MS:-60000}
      MFA_WORKER_MAX_OUTPUT_BYTES: ${MFA_WORKER_MAX_OUTPUT_BYTES:-256000}
    volumes:
      - artifact_data:/data/artifacts
      - /var/run/docker.sock:/var/run/docker.sock

  healthcheck:
    build:
      context: ..
    profiles: ["ops"]
    depends_on:
      web:
        condition: service_healthy
    command: ["npm", "run", "healthcheck"]
    environment:
      NODE_ENV: production
      MFA_BASE_URL: ${MFA_BASE_URL:?MFA_BASE_URL is required}
      MFA_HEALTHCHECK_TIMEOUT_MS: ${MFA_HEALTHCHECK_TIMEOUT_MS:-5000}
      MFA_HEALTHCHECK_BEARER: ${MFA_HEALTHCHECK_BEARER:-}
      MFA_HEALTHCHECK_ASSIGNMENTS: ${MFA_HEALTHCHECK_ASSIGNMENTS:-false}

  backup:
    build:
      context: ..
    profiles: ["ops"]
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "run", "backup"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-math_for_agents}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-math_for_agents}
      DATABASE_SSL: "false"
      ARTIFACT_STORAGE_DIR: /data/artifacts
      BACKUP_DIR: /data/backups
      BACKUP_REMOTE_DIR: ${BACKUP_REMOTE_DIR:-}
    volumes:
      - artifact_data:/data/artifacts:ro
      - ${BACKUP_DIR_HOST:-../backups}:/data/backups
      - ${BACKUP_REMOTE_DIR_HOST:-../backup-remote}:/data/backup-remote

volumes:
  postgres_data:
  artifact_data:
